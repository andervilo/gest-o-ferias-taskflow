services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-taskflow}
      POSTGRES_USER: ${DB_USER:-taskflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow} -d ${DB_NAME:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./projeto-TaskFlow
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-taskflow}
      DB_USER: ${DB_USER:-taskflow}
      DB_PASSWORD: ${DB_PASSWORD:-taskflow}
      APP_SECURITY_JWT_SECRET: ${JWT_SECRET:-change-me-dev-secret-change-me-dev-secret-0123456789}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./front
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:

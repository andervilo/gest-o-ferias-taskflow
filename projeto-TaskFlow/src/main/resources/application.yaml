spring:
  application:
    name: gestao-colaboradores
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

app:
  security:
    jwt:
      # Override em produção via APP_SECURITY_JWT_SECRET (mín. 32 bytes p/ HS256)
      secret: ${APP_SECURITY_JWT_SECRET:change-me-dev-secret-change-me-dev-secret-0123456789}
      expiration-minutes: ${APP_SECURITY_JWT_EXP_MINUTES:480}
